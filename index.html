<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LunaFeeder Cat Food Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>Cat Feeding Calculator</h1>
      <p>Estimate daily calories and servings for your cat based on weight, goals, and food brand.</p>
    </header>

    <section class="card input-card">
      <h2>Cat Profile</h2>
      <form id="calculatorForm">
        <div class="field-row">
          <label for="gender">Gender</label>
          <select id="gender" name="gender">
            <option value="female">Female</option>
            <option value="male">Male</option>
          </select>
        </div>

        <div class="field-row">
          <label for="currentWeight">Current weight (lbs)</label>
          <input id="currentWeight" name="currentWeight" type="number" step="0.1" min="0" value="9.0" required />
        </div>

        <div class="field-row">
          <label for="goalWeight">Goal weight (lbs)</label>
          <input id="goalWeight" name="goalWeight" type="number" step="0.1" min="0" value="8.5" required />
        </div>

        <div class="field-row">
          <label for="brand">Dry food brand</label>
          <select id="brand" name="brand"></select>
        </div>

        <div class="field-row">
          <label for="servingType">Dry serving type</label>
          <select id="servingType" name="servingType">
            <option value="cup">Cups</option>
            <option value="can">Cans</option>
            <option value="pouch">Pouches</option>
          </select>
        </div>

        <div class="field-row">
          <label for="wetBrand">Wet food brand</label>
          <select id="wetBrand" name="wetBrand"></select>
        </div>

        <div class="field-row">
          <label for="wetServingType">Wet serving type</label>
          <select id="wetServingType" name="wetServingType">
            <option value="can">Cans</option>
            <option value="pouch">Pouches</option>
          </select>
        </div>

        <div class="field-row">
          <label for="wetAmount">Wet food amount per day</label>
          <input id="wetAmount" name="wetAmount" type="number" step="0.1" min="0" value="0" />
        </div>

        <div class="field-row checkbox-row">
          <input id="isActive" name="isActive" type="checkbox" />
          <label for="isActive">Active cat (more energy)</label>
        </div>

        <button type="submit">Calculate</button>
      </form>
    </section>

    <section class="card result-card" id="resultCard">
      <h2>Results</h2>
      <div id="resultText" class="result-text">Fill out the form and click calculate.</div>
      <div id="brandDetails" class="brand-details"></div>
    </section>

    <section class="card brand-card">
      <h2>Food Brands Database</h2>
      <p>Each brand includes calories per cup, can or pouch size to help estimate recommended feeding.</p>
      <div id="brandGrid" class="brand-grid"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
